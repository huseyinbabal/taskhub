# Local infra for running TaskHub during development.
# Session 8 adds Prometheus / Grafana / Loki here.
services:
  # Hazelcast backs the Hibernate second-level cache (spec/hibernate-l2-cache-hazelcast.md).
  # taskhub-api connects to it as a client; the cache tier scales/restarts on its own.
  hazelcast:
    image: hazelcast/hazelcast:5.5.0
    container_name: taskhub-hazelcast
    environment:
      HZ_CLUSTERNAME: taskhub
      # Enable only the health-check REST endpoint group — used by the healthcheck below.
      HZ_NETWORK_RESTAPI_ENABLED: "true"
      HZ_NETWORK_RESTAPI_ENDPOINTGROUPS_HEALTHCHECK_ENABLED: "true"
    ports:
      - "5701:5701"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/node-state | grep -q ACTIVE"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Hazelcast Management Center — web UI to inspect the cluster, cache maps (the L2 cache
  # regions) and their entry counts. Dev-only convenience; not part of the runtime path.
  # Its UI listens on 8080 in-container, mapped to 8090 on the host so it does not clash
  # with taskhub-api. Auto-connects to the cluster above.
  hazelcast-management-center:
    image: hazelcast/management-center:5.5.0
    container_name: taskhub-hazelcast-mc
    environment:
      MC_DEFAULT_CLUSTER: taskhub
      MC_DEFAULT_CLUSTER_MEMBERS: hazelcast:5701
    ports:
      - "8090:8080"
    depends_on:
      hazelcast:
        condition: service_healthy
    healthcheck:
      # MC serves its SPA (HTTP 200) once the web server is up; -f fails on non-2xx.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:17
    container_name: taskhub-postgres
    environment:
      POSTGRES_DB: taskhub
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
    ports:
      - "5432:5432"
    volumes:
      - taskhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub -d taskhub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  taskhub-pgdata:

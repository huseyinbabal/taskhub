spring:
  application:
    name: taskhub-api
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema (SPEC boundary); Hibernate only validates it.
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

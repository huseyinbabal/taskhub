spring:
  application:
    name: taskhub-api
  profiles:
    default: dev
  grpc:
    client:
      channel:
        # notification-service (SPEC §Session 3). Task events are best-effort: if this
        # target is unreachable the mutation still succeeds and the failure is logged.
        notifications:
          target: ${TASKHUB_NOTIFICATIONS_TARGET:static://localhost:9090}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema (SPEC boundary); Hibernate only validates it.
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

taskhub:
  jwt:
    # Secret is environment-supplied (dev default below; prod requires TASKHUB_JWT_SECRET).
    secret: ${TASKHUB_JWT_SECRET:}
    expiration: 1h
  cors:
    # Explicit front-end origins; overridden per environment. Never '*' in prod.
    allowed-origins: ${TASKHUB_CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

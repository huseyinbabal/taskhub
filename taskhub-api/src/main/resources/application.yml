spring:
  application:
    name: taskhub-api
  profiles:
    default: dev
  grpc:
    client:
      channel:
        # notification-service (SPEC §Session 3). Task events are best-effort: if this
        # target is unreachable the mutation still succeeds and the failure is logged.
        notifications:
          target: ${TASKHUB_NOTIFICATIONS_TARGET:static://localhost:9090}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema (SPEC boundary); Hibernate only validates it.
      ddl-auto: validate
    properties:
      # Hibernate second-level cache backed by Hazelcast (spec/hibernate-l2-cache-hazelcast.md).
      # taskhub-api connects to the Hazelcast container as a native client. Only entities
      # explicitly annotated @Cacheable are cached (ENABLE_SELECTIVE); the query cache is on
      # but opt-in per query. fallback=true means an unreachable cluster degrades to no-cache
      # rather than failing — the cache is an optimisation, never a correctness dependency.
      hibernate.cache.use_second_level_cache: true
      hibernate.cache.use_query_cache: true
      hibernate.cache.region.factory_class: com.hazelcast.hibernate.HazelcastCacheRegionFactory
      hibernate.cache.hazelcast.use_native_client: true
      hibernate.cache.hazelcast.native_client_address: ${TASKHUB_HAZELCAST_ADDRESS:127.0.0.1:5701}
      hibernate.cache.hazelcast.native_client_cluster_name: ${TASKHUB_HAZELCAST_CLUSTER:taskhub}
      hibernate.cache.hazelcast.fallback: true
      jakarta.persistence.sharedCache.mode: ENABLE_SELECTIVE
  flyway:
    enabled: true
    locations: classpath:db/migration

taskhub:
  jwt:
    # Secret is environment-supplied (dev default below; prod requires TASKHUB_JWT_SECRET).
    secret: ${TASKHUB_JWT_SECRET:}
    expiration: 1h
  cors:
    # Explicit front-end origins; overridden per environment. Never '*' in prod.
    allowed-origins: ${TASKHUB_CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

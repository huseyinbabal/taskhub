spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/taskhub
    username: taskhub
    password: taskhub
  jpa:
    show-sql: true
    properties:
      # Expose Hibernate cache hit/miss/put counts (surfaced as metrics) so the L2 cache
      # can be observed locally. Off in prod by default — small per-operation overhead.
      hibernate.generate_statistics: true

# Dev-only, non-production JWT secret (HS256 needs ≥ 32 bytes) and local front-end origins.
taskhub:
  jwt:
    secret: dev-only-insecure-secret-change-me-32bytes!!
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

# Expose full health details locally for convenience.
management:
  endpoint:
    health:
      show-details: always
